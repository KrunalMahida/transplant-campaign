<!DOCTYPE html>
<html>

<head>

<title>Organ Transplant Awareness Campaign</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#ff7a00;
margin:0;
text-align:center;
color:white;
}

.header{
padding:20px;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
color:black;
padding:20px;
border-radius:12px;
max-width:420px;
margin:auto;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

input,select,button{
width:90%;
padding:12px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#ff7a00;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
}

canvas{
margin-top:20px;
max-width:100%;
border-radius:10px;
}

.checkbox{
text-align:left;
margin-left:20px;
}

</style>

</head>

<body>

<div class="header">
Gift Life – Organ Transplant Awareness
</div>

<div class="container">

<div class="card">

<select id="role" onchange="handleRoleChange()">
<option value="recipient">Organ Transplant Recipient</option>
<option value="donor">Living Organ Donor</option>
<option value="pledge">I Pledge for Organ Donation</option>
</select>

<div class="checkbox">
<label><input type="checkbox" id="cadaver"> Cadaver Donor</label><br>
<label><input type="checkbox" id="living"> Living Donor</label>
</div>

<select id="organ">
<option value="Kidney">Kidney</option>
<option value="Liver">Liver</option>
<option value="Heart">Heart</option>
<option value="Lungs">Lungs</option>
<option value="Pancreas">Pancreas</option>
<option value="Cornea">Cornea</option>
<option value="Hand">Hand</option>
</select>

<input type="file" id="photo">

<button onclick="generatePoster()">Generate Campaign Poster</button>

<canvas id="canvas" width="500" height="500"></canvas>

<button onclick="downloadPoster()">Download Image</button>

</div>

</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function handleRoleChange(){

let role = document.getElementById("role").value;
let organ = document.getElementById("organ");

let cadaver = document.getElementById("cadaver");
let living = document.getElementById("living");

if(role=="pledge"){
organ.disabled = true;
cadaver.disabled = true;
living.disabled = true;

cadaver.checked = false;
living.checked = false;

}else if(role=="donor"){
organ.disabled = false;
cadaver.disabled = true;
living.disabled = true;

cadaver.checked = false;
living.checked = false;

}else{
organ.disabled = false;
cadaver.disabled = false;
living.disabled = false;
}

}

function generatePoster(){

let role=document.getElementById("role").value;
let organ=document.getElementById("organ").value;
let file=document.getElementById("photo").files[0];

let cadaver=document.getElementById("cadaver").checked;
let living=document.getElementById("living").checked;

if(!file){
alert("Please upload photo");
return;
}

let typeText="";
if(role=="recipient"){
if(cadaver && living){
typeText="Cadaver & Living";
}
else if(cadaver){
typeText="Cadaver";
}
else if(living){
typeText="Living";
}
}

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();
img.src=e.target.result;

img.onload=function(){

ctx.clearRect(0,0,500,500);

// BACKGROUND
ctx.fillStyle="#ff7a00";
ctx.fillRect(0,0,500,500);

// BIG CIRCLE PHOTO (NO OVERLAP)
ctx.save();
ctx.beginPath();
ctx.arc(250,150,150,0,Math.PI*2,true);
ctx.closePath();
ctx.clip();
ctx.drawImage(img,100,0,300,300);
ctx.restore();

// WHITE BORDER
ctx.beginPath();
ctx.arc(250,150,155,0,Math.PI*2);
ctx.strokeStyle="white";
ctx.lineWidth=6;
ctx.stroke();

// ORANGE TEXT AREA (SHIFTED DOWN - FIXED)
ctx.fillStyle="rgba(255,122,0,0.95)";
ctx.fillRect(0,320,500,180);

// TEXT
ctx.fillStyle="white";
ctx.textAlign="center";

ctx.font="bold 22px Arial";

if(role=="recipient"){
ctx.fillText("I'm a Transplant Survivor",250,370);
ctx.font="16px Arial";
ctx.fillText("Organ: "+organ,250,400);

if(typeText!=""){
ctx.fillText("Donor Type: "+typeText,250,430);
}
}

if(role=="donor"){
ctx.fillText("I Donated My "+organ,250,370);
ctx.font="16px Arial";
ctx.fillText("To Save a Life",250,400);
}

if(role=="pledge"){
ctx.fillText("I Pledge for Organ Donation",250,380);
}

ctx.font="bold 28px Arial";
ctx.fillText("Donate Organ Save Lives",250,480);

}

}

reader.readAsDataURL(file);

}

function downloadPoster(){
let link=document.createElement("a");
link.download="campaign.png";
link.href=canvas.toDataURL();
link.click();
}

</script>

</body>
</html>
